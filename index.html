<!DOCTYPE html>
<html>
<head>
    <title>MX Career Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🏁 MX Career Simulator</h1>

<div id="stats">
    <p>Day: <span id="day"></span></p>
    <p>Level: <span id="level"></span></p>
    <p>Skill: <span id="skill"></span></p>
    <p>Stamina: <span id="stamina"></span></p>
    <p>Confidence: <span id="confidence"></span></p>
    <p>Money: $<span id="money"></span></p>
</div>

<div id="actions">
    <button onclick="train()">Train</button>
    <button onclick="race()">Race</button>
    <button onclick="rest()">Rest</button>
</div>

<h2>📋 Career Log</h2>
<div id="log"></div>

<script src="game.js"></script>

</body>
</html>
